<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240" role="img" aria-label="Synapse — realtime coordination for teams of coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#141d33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="878" height="238" rx="22" fill="url(#bg)" stroke="#243049" stroke-width="1.5"/>

  <!-- node-graph motif: a hub (server) coordinating four agents; one is "warned" -->
  <g stroke="url(#accent)" stroke-width="1.5" opacity="0.5" fill="none">
    <line x1="700" y1="120" x2="612" y2="68"/>
    <line x1="700" y1="120" x2="612" y2="172"/>
    <line x1="700" y1="120" x2="800" y2="70"/>
    <line x1="700" y1="120" x2="800" y2="170"/>
  </g>
  <g>
    <circle cx="700" cy="120" r="14" fill="#0b1020" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="612" cy="68" r="8" fill="#38bdf8"/>
    <circle cx="612" cy="172" r="8" fill="#a78bfa"/>
    <circle cx="800" cy="70" r="8" fill="#a78bfa"/>
    <circle cx="800" cy="170" r="8" fill="#38bdf8"/>
    <!-- the agent being warned before it edits a contested symbol -->
    <circle cx="612" cy="172" r="14" fill="none" stroke="#fbbf24" stroke-width="2"/>
  </g>

  <!-- wordmark -->
  <text x="64" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="700" letter-spacing="7" fill="#f8fafc">SYNAPSE</text>
  <rect x="66" y="140" width="118" height="4" rx="2" fill="url(#accent)"/>
  <text x="66" y="180" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#9aa7bd">Realtime coordination for teams of coding agents</text>
</svg>

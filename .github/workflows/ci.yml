name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPENROUTER_API_KEY: ""
      SYNAPSE_LLM_EXPLAIN: "0"
      SYNAPSE_LLM_RESOLVE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run ci:strict:static

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      OPENROUTER_API_KEY: ""
      SYNAPSE_LLM_EXPLAIN: "0"
      SYNAPSE_LLM_RESOLVE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run ci:strict:unit

  detection-ratchet:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      OPENROUTER_API_KEY: ""
      SYNAPSE_LLM_EXPLAIN: "0"
      SYNAPSE_LLM_RESOLVE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run ci:strict:detection

  agent-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENROUTER_API_KEY: ""
      SYNAPSE_LLM_EXPLAIN: "0"
      SYNAPSE_LLM_RESOLVE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run ci:strict:agent-loop

  polyglot:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      OPENROUTER_API_KEY: ""
      SYNAPSE_LLM_EXPLAIN: "0"
      SYNAPSE_LLM_RESOLVE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Cache analyzer-py venv
        uses: actions/cache@v4
        with:
          path: packages/analyzer-py/.venv
          key: analyzer-py-${{ runner.os }}-py3.12-${{ hashFiles('packages/analyzer-py/requirements.txt') }}
      - run: npm ci
      - run: npm run build
      - run: npm run ci:strict:polyglot

  services-security:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      OPENROUTER_API_KEY: ""
      SYNAPSE_LLM_EXPLAIN: "0"
      SYNAPSE_LLM_RESOLVE: "0"
      SYNAPSE_VERIFY_PG_URL: postgres://postgres@localhost:5432/postgres
      SYNAPSE_VERIFY_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run ci:strict:services

  package-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENROUTER_API_KEY: ""
      SYNAPSE_LLM_EXPLAIN: "0"
      SYNAPSE_LLM_RESOLVE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: docker info
      - run: npm ci
      - run: npm run build
      - run: npm run ci:strict:package

  required:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: always()
    needs:
      - static
      - unit
      - detection-ratchet
      - agent-loop
      - polyglot
      - services-security
      - package-release
    env:
      OPENROUTER_API_KEY: ""
      SYNAPSE_LLM_EXPLAIN: "0"
      SYNAPSE_LLM_RESOLVE: "0"
    steps:
      - name: Check required strict gates
        run: |
          echo '${{ toJson(needs) }}'
          test '${{ needs.static.result }}' = 'success'
          test '${{ needs.unit.result }}' = 'success'
          test '${{ needs['detection-ratchet'].result }}' = 'success'
          test '${{ needs['agent-loop'].result }}' = 'success'
          test '${{ needs.polyglot.result }}' = 'success'
          test '${{ needs['services-security'].result }}' = 'success'
          test '${{ needs['package-release'].result }}' = 'success'

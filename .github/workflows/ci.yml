# CI gate (plan-future.md M1). Two jobs:
#   check  — fast feedback: build + typecheck + unit tests.
#   verify — the full hermetic verify matrix + eval via scripts/ci-verify-all.mjs
#            (the same single command devs run locally). verify-docker runs for
#            real on ubuntu runners (docker is preinstalled); it self-skips when
#            docker is absent. Latency gates are the verify scripts' own exit
#            codes — no separate budget mechanism here.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.2
          cache: npm
      - run: corepack prepare npm@11.4.1 --activate
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      # Backs verify-persistence-pg + the Postgres variants of store.test.ts.
      # Exposed as SYNAPSE_VERIFY_PG_URL (not SYNAPSE_DATABASE_URL) so the rest
      # of the matrix keeps exercising the default SQLite backend.
      postgres:
        # postgres:16 + the pgvector extension (verify-why-rag); everything
        # the plain image served (store/persistence/multi-instance) still runs.
        image: pgvector/pgvector:pg16
        env:
          # Ephemeral job-local database: trust auth, no credential at all.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Backs verify-multi-instance (M9 fan-out channel).
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.2
          cache: npm
      - run: corepack prepare npm@11.4.1 --activate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Cache analyzer-py venv
        uses: actions/cache@v4
        with:
          path: packages/analyzer-py/.venv
          key: analyzer-py-${{ runner.os }}-py3.12-${{ hashFiles('packages/analyzer-py/requirements.txt') }}
      - run: npm ci
      - name: Build, test, and run the full verify matrix
        run: node scripts/ci-verify-all.mjs
        env:
          # Hermetic: the runner also forces these, belt and suspenders.
          OPENROUTER_API_KEY: ""
          SYNAPSE_LLM_EXPLAIN: "0"
          SYNAPSE_VERIFY_PG_URL: postgres://postgres@localhost:5432/postgres
          SYNAPSE_VERIFY_REDIS_URL: redis://localhost:6379

# Ship the Synapse coordination server to a machine.
#
#   1. cp .env.example .env  and set SYNAPSE_MASTER_SECRET (a long random string)
#   2. docker compose up -d          # starts just the server
#   3. SYNAPSE_MASTER_SECRET=… synapse keygen   # mint a per-project key
#   4. teammates: SYNAPSE_PROJECT_KEY=<key> synapse up
#
# Durable state lives in the named `synapse-state` volume so a restart resumes
# live team state. The Postgres/Redis services are reserved for the future
# multi-tenant phase and stay off unless you opt in with `--profile saas`.

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "${SYNAPSE_SERVER_PORT:-4010}:${SYNAPSE_SERVER_PORT:-4010}"
    environment:
      SYNAPSE_SERVER_PORT: "${SYNAPSE_SERVER_PORT:-4010}"
      # State persists to the mounted volume below.
      SYNAPSE_DB_PATH: /data/state.db
      # Set SYNAPSE_MASTER_SECRET in .env for project-key auth + tenancy.
      SYNAPSE_MASTER_SECRET: "${SYNAPSE_MASTER_SECRET:-}"
      # Or use the legacy shared token (ignored when MASTER_SECRET is set).
      SYNAPSE_AUTH_TOKEN: "${SYNAPSE_AUTH_TOKEN:-}"
      SYNAPSE_GITHUB_WEBHOOK_SECRET: "${SYNAPSE_GITHUB_WEBHOOK_SECRET:-}"
    volumes:
      - synapse-state:/data
    restart: unless-stopped

  # --- multi-tenant phase (off by default; enable with `--profile saas`) ---
  postgres:
    image: postgres:16
    profiles: ["saas"]
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-synapse}"
      POSTGRES_DB: "${POSTGRES_DB:-synapse}"
    volumes:
      - synapse-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    profiles: ["saas"]
    volumes:
      - synapse-redis:/data

volumes:
  synapse-state:
  synapse-postgres:
  synapse-redis:
